<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La boule magique</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4 flex items-center justify-center bg-pink-100">
    <section class="max-w-[700px] rounded-xl shadow-lg bg-white border border-gray-300 p-4">
    <header class="flex justify-center items-center border-b-4 m-4 border-cyan-400 gap-5">
        <div class="">
            <img src="../static/boulecrystal.jpeg" class="w-32"/>
        </div>
        <div>
            <h1 class="text-3xl font-bold">La boule magique</h1>
            <p class="text-lg font-semibold">Vous le vouliez tant, c'est le moment...</p>
        </div>
    </header>

    <main class="grid grid-cols-2 gap-4">
        <div class="flex items-center justify-center">
            <img src="../static/pont.jpeg" class="w-64"/>
        </div>
        <div class="flex flex-col gap-3 p-1 items-center justify-center">
            <form method="POST">
                <label for="question" class="font-semibold py-3">Où veux-tu aller...</label>
                <input name="question" type="text" class="border border-purple-200 rounded w-full mb-4"/>
                <button type="submit" class="w-full bg-gradient-to-r from-pink-200 to-yellow font-semibold py-3 rounded-lg">Lancer la prophétie</button>
            </form>
        </div>
    </main>

    <footer>
        <section>
            <p>Ceci est la réponse</p>
                <p>{{ response }}</p>
        </section>
    </footer>

    </section>
</body>
</html>
