    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>la boule magic</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="p-4 flex items-center justify-center">
        <section>

            <div class=" grid p-4 mx-auto border-2 border-sky-400 rounded-xl">   
                <header>
                    <div >
                        <img class="mx-auto" src="../static/Capture décran 2026-01-07 184818.png">
                    </div>
                    <div>
                        <h1>La boulle magique</h1>
                        <p>demande au destin</p>
                    </div>
                </header>
                
                <main>
                    <div>
                        <form method="POST">
                            <label for="question"> Où veut tu aller</label>
                            <input class=" border-2 border-purple-400 border rounded-xl" name="question" type="text"/>
                            <button class="  hover:bg-red-400 shadow-xl  rounded-lg bg-red-500 text-stone-950" type="submit">lancer la prophési</button>

                        </form>
                    </div>
                </main>
            </div>   
            <footer>
                <div class="flex flex-col border-2 border-sky-400 p-4 rounded-lg">
                    <section >
                        <p class="text-center">ceci et la réponse</p>
                        {% if response %}
                            <p class="text-center">{{ response }}</p>
                        {% endif %}
                    </section>
                </div>
            </footer>

        </section>
    </body>
    </html>
