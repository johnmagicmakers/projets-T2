<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La boule magique</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <section>
    <header>
        <div>
            <img src="../static/logo.jpg"/>
        </div>
        <div>
            <h1>La boule magique</h1>
            <p>Posez-moi vos questions</p>
        </div>
    </header>

    <main>
        <div>
            <img src="../static/incertitude.jpeg"/>
        </div>
        <div>
            <form method="POST">
                <label for="question">Où veux-tu aller...</label>
                <input name="question" type="text">
                <button type="submit">Lancer la prophétie</button>
            </form>
        </div>
    </main>

    <footer>
        <section>
            <p>{{ response }}</p>
        </section>
    </footer>
    
    </section>
</body>
</html>
