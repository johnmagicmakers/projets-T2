<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-500 to-violet-500">
    <div class="flex flex-col items-center justify-center gap-7">
    <header class ="flex flex-col items-center justify-center gap-7">
        <h1 class="flex flex-col underline decoration-2 items-center justify-center w-full size-10 font-bold font-serif text-3xl">Le pendu</h1>
        <img src="static/images_pendu/pendu{{ etat_jeu['vies'] }}.png">
    </header>
    <main class ="flex flex-col items-center justify-center gap-7">
        <p>{{ etat_jeu["mot_a_afficher"] }}</p>
        <p>Vies : {{ etat_jeu["vies"] }}</p>
    {% if etat_jeu["victoire"] %}
        <div class="">Victoire ! Bien joué {{ score }}</div>
        <a href="/" class="bg-indigo-500 hover:bg-fuchsia-500 w-1/2"><button>Relancer</button></a>
    {% elif etat_jeu["defaite"] %}
        <div>Défaite ! Tu peux mieux faire. le mot à deviner était : {{etat_jeu["mot_a_deviner"]}}</div>
        <a href="/" class=" bg-indigo-500 hover:bg-fuchsia-500 w-1/2 items-center justify-center"><button>Réessayer</button></a>
    {% else %}
        <form action="/deviner" method="POST">
            <div class="flex flex-col items-center justify-center gap-3 items-center justify-center">
            <input type="texte" name="essai" class="" >
            <button type="submit" class=" bg-indigo-500 hover:bg-fuchsia-500 w-1/2 ">Valider</button>
            </div>
        </form>
    {% endif %}

    </main></div>
    <footer>

    </footer>
</body>
</html>
